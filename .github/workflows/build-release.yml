name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.2.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
        shell: cmd

      - name: Build executable
        run: python build_app.py --onefile --clean
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MasterVPN-Windows-x64
          path: dist/MasterVPN.exe
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app bundle
        run: python build_app.py --clean

      - name: Create zip
        run: |
          cd dist
          if [ -d "MasterVPN.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent MasterVPN.app ../MasterVPN-macOS.zip
          else
            ditto -c -k --sequesterRsrc --keepParent MasterVPN ../MasterVPN-macOS.zip
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MasterVPN-macOS
          path: MasterVPN-macOS.zip
          retention-days: 7

  release:
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: MasterVPN-Windows-x64
          path: artifacts

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: MasterVPN-macOS
          path: artifacts

      - name: List files
        run: ls -lhR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: "MasterVPN ${{ steps.tag.outputs.version }}"
          draft: false
          prerelease: false
          body: |
            ## MasterVPN ${{ steps.tag.outputs.version }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows x64 | `MasterVPN.exe` |
            | macOS | `MasterVPN-macOS.zip` |

            ### First Run
            - **Windows**: Click More info then Run anyway if SmartScreen appears
            - **macOS**: Right-click the app and select Open (first time only)
          files: |
            artifacts/MasterVPN.exe
            artifacts/MasterVPN-macOS.zip
