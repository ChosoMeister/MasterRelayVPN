name: Build & Release

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.2.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: MasterVPN.exe
            asset_name: MasterVPN-Windows-x64.exe
          - os: macos-latest
            artifact: MasterVPN.app
            asset_name: MasterVPN-macOS-arm64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pywebview pyinstaller

      # ── Windows Build ──────────────────────────────────────────
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          python build_app.py --onefile --clean

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          copy dist\MasterVPN.exe MasterVPN.exe

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: MasterVPN-Windows-x64
          path: MasterVPN.exe
          retention-days: 7

      # ── macOS Build ────────────────────────────────────────────
      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          python build_app.py --clean

      - name: Prepare artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          # Create a zip of the .app bundle for distribution
          if [ -d "MasterVPN.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent MasterVPN.app ../MasterVPN-macOS-arm64.zip
          else
            # onedir fallback — zip the folder
            ditto -c -k --sequesterRsrc --keepParent MasterVPN ../MasterVPN-macOS-arm64.zip
          fi

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: MasterVPN-macOS-arm64
          path: MasterVPN-macOS-arm64.zip
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: MasterVPN-Windows-x64
          path: ./artifacts

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: MasterVPN-macOS-arm64
          path: ./artifacts

      - name: List artifacts
        run: ls -lhR ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: MasterVPN ${{ steps.version.outputs.tag }}
          body: |
            ## MasterVPN ${{ steps.version.outputs.tag }}

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | 🪟 Windows x64 | `MasterVPN-Windows-x64.exe` | Portable — just run it |
            | 🍎 macOS arm64 | `MasterVPN-macOS-arm64.zip` | Extract and run MasterVPN.app |

            ### ⚠️ First Run
            - **Windows:** You may see "Windows protected your PC" — click **More info → Run anyway**
            - **macOS:** Right-click the app → Open (first time only, to bypass Gatekeeper)

            ### Features
            - 🖥️ GUI with dark theme (no terminal needed)
            - ⚡ Multi Script ID load balancing
            - 🔒 MITM certificate management
            - 📊 Real-time traffic stats and logs
          draft: false
          prerelease: false
          files: |
            ./artifacts/MasterVPN.exe
            ./artifacts/MasterVPN-macOS-arm64.zip
