name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.2.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        shell: cmd
        run: python build_app.py --onefile --clean

      - name: Verify output
        shell: cmd
        run: dir dist\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/MasterVPN.exe
          if-no-files-found: error

  build-macos:
    strategy:
      matrix:
        os: [macos-13, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app bundle
        run: python build_app.py --clean

      - name: Create zip
        run: |
          cd dist
          if [ -d "MasterVPN.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent MasterVPN.app ../MasterVPN-macOS-${{ runner.arch }}.zip
          else
            ditto -c -k --sequesterRsrc --keepParent MasterVPN ../MasterVPN-macOS-${{ runner.arch }}.zip
          fi

      - name: Verify output
        run: ls -lh MasterVPN-macOS-${{ runner.arch }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-${{ runner.arch }}
          path: MasterVPN-macOS-${{ runner.arch }}.zip
          if-no-files-found: error

  release:
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare release files
        run: |
          mkdir -p release
          cp dist/windows-build/MasterVPN.exe release/MasterVPN-Windows-x64.exe
          cp dist/macos-build-X64/MasterVPN-macOS-X64.zip release/MasterVPN-macOS-Intel.zip
          cp dist/macos-build-ARM64/MasterVPN-macOS-ARM64.zip release/MasterVPN-macOS-Silicon.zip
          echo "=== Release files ==="
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: "MasterVPN ${{ steps.tag.outputs.version }}"
          draft: false
          prerelease: false
          body: |
            ## MasterVPN ${{ steps.tag.outputs.version }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows x64 | `MasterVPN-Windows-x64.exe` |
            | macOS (Apple Silicon) | `MasterVPN-macOS-Silicon.zip` |
            | macOS (Intel) | `MasterVPN-macOS-Intel.zip` |

            ### First Run
            - **Windows**: Click More info then Run anyway if SmartScreen appears
            - **macOS**: Right-click the app and select Open (first time only)

            ### Features
            - GUI with dark theme (no terminal needed)
            - Multi Script ID load balancing
            - MITM certificate management
            - Real-time traffic stats and logs
          files: |
            release/MasterVPN-Windows-x64.exe
            release/MasterVPN-macOS-Silicon.zip
            release/MasterVPN-macOS-Intel.zip
